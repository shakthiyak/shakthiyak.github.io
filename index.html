<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakthi Chathuranga | Portfolio & Production Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* 🌐 Premium Glassmorphism Navigation Bar */
        nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #38bdf8, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tabs {
            display: flex;
            list-style: none;
            height: 100%;
            gap: 10px;
        }

        .nav-tabs li {
            height: 100%;
        }

        .nav-tabs a {
            display: flex;
            align-items: center;
            padding: 0 20px;
            text-decoration: none;
            color: #94a3b8;
            font-weight: 500;
            height: 100%;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .nav-tabs a:hover, .nav-tabs a.active {
            color: #38bdf8;
            border-bottom: 3px solid #38bdf8;
        }

        /* 📸 Hero Personal Section with Photo Layout */
        .hero {
            position: relative;
            min-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            /* 🌟 Ceramic Industrial Background */
            background: linear-gradient(rgba(15, 23, 42, 0.88), rgba(15, 23, 42, 0.95)), 
                        url('https://images.unsplash.com/photo-1610557892470-55d9e80c0bce?q=80&w=1920&auto=format&fit=crop') no-repeat center center/cover;
        }

        .hero-container {
            max-width: 1100px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 50px;
            text-align: left;
        }

        /* 🧍‍♂️ User Profile Image Styling */
        .profile-img-container {
            flex: 1;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .profile-img {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            /* 🌟 ඔලුව උඩින් කැපෙන්නේ නැති වෙන්න හදපු කෑල්ල */
            object-fit: cover;
            object-position: center 20%;
            border: 4px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.03);
            border-color: #38bdf8;
        }

        .hero-content {
            flex: 1.5;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 9999px;
            color: #38bdf8;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .hero h1 {
            font-size: 46px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .hero h1 span {
            background: linear-gradient(to right, #38bdf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 18px;
            color: #94a3b8;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 25px;
        }

        /* 👔 LinkedIn Button Style */
        .linkedin-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #0077b5;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 119, 181, 0.2);
        }

        .linkedin-btn:hover {
            background-color: #005987;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 119, 181, 0.3);
        }

        /* 🛠 Tool Card Preview (The Calculator Section) */
        .tools-section {
            max-width: 1200px;
            margin: -40px auto 80px auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .tool-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .tool-info {
            flex: 1;
            text-align: left;
        }

        .tool-tag {
            color: #818cf8;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
        }

        .tool-info h2 {
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .tool-info p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* 🏺 100% වැඩ කරන අලුත්ම Ceramic Factory Clay Pottery Visual Link */
        .tool-image {
            flex: 1;
            height: 280px;
            background: linear-gradient(rgba(30, 41, 59, 0.1), rgba(15, 23, 42, 0.3)),
                        url('https://images.unsplash.com/photo-1565192647048-f997eed87981?q=80&w=600&auto=format&fit=crop') no-repeat center center/cover;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 🚀 Action Buttons Group */
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(to right, #0ea5e9, #2563eb);
            color: #ffffff;
            text-decoration: none;
            padding: 16px 32px;
            font-size: 16px

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceramic Pallet Builder</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #2ecc71;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-area {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 26px;
        }

        .back-btn {
            background-color: #7f8c8d;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background-color: #95a5a6;
        }

        .cpb-main-container {
            display: flex;
            gap: 20px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            max-width: 1100px;
            width: 100%;
            box-sizing: border-box;
        }

        .cpb-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 300px;
        }

        .section-title {
            margin: 0 0 5px 0;
            font-size: 16px;
            color: var(--primary-color);
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }

        .cpb-input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .cpb-input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .cpb-input-group label {
            font-weight: 600;
            color: #475569;
            font-size: 13px;
        }

        .cpb-input-group input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            background: #f8fafc;
            transition: border 0.2s;
        }

        .cpb-input-group input:focus {
            border-color: #3498db;
            outline: none;
        }

        .cpb-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            transition: background 0.2s, transform 0.1s;
        }

        .cpb-btn:hover {
            background-color: #27ae60;
        }

        .cpb-btn:active {
            transform: scale(0.98);
        }

        .cpb-stats {
            background: #1e293b;
            color: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 5px;
        }

        .cpb-stat-row {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
        }

        .cpb-stats span {
            font-weight: bold;
            color: #38bdf8;
        }

        .cpb-visualizer {
            flex: 2;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .cpb-view-box {
            flex: 1;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            min-width: 280px;
        }

        .cpb-view-box h4 {
            margin: 0 0 10px 0;
            color: #64748b;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cpb-view-box canvas {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            width: 100%;
            height: auto;
        }

        @media (max-width: 850px) {
            .cpb-main-container {
                flex-direction: column;
            }
            .header-area {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>🧱 Ceramic Pallet Builder</h1>
        <a href="tools.html" class="back-btn">← Back to Tools</a>
    </div>

    <div class="cpb-main-container">
        <div class="cpb-controls">
            <div class="section-title">Pallet Dimensions</div>
            <div class="cpb-input-grid">
                <div class="cpb-input-group">
                    <label>Pallet Length (mm)</label>
                    <input type="number" id="cpbPalletLen" value="1200">
                </div>
                <div class="cpb-input-group">
                    <label>Pallet Width (mm)</label>
                    <input type="number" id="cpbPalletWid" value="1000">
                </div>
            </div>
            
            <div class="section-title">Box Dimensions & Specification</div>
            <div class="cpb-input-grid">
                <div class="cpb-input-group">
                    <label>Box Length (mm)</label>
                    <input type="number" id="cpbBoxLen" value="400">
                </div>
                <div class="cpb-input-group">
                    <label>Box Width (mm)</label>
                    <input type="number" id="cpbBoxWid" value="300">
                </div>
                <div class="cpb-input-group">
                    <label>Box Height (mm)</label>
                    <input type="number" id="cpbBoxHei" value="200">
                </div>
                <div class="cpb-input-group">
                    <label>Box Weight (kg)</label>
                    <input type="number" id="cpbBoxWeight" value="22">
                </div>
            </div>
            
            <div class="section-title">Stacking Height</div>
            <div class="cpb-input-group">
                <label>Number of Layers</label>
                <input type="number" id="cpbLayers" value="5">
            </div>
            
            <button class="cpb-btn" onclick="runCeramicPalletBuilder()">Generate Layout</button>
            
            <div class="section-title" style="margin-top: 10px;">Calculation Results</div>
            <div class="cpb-stats">
                <div class="cpb-stat-row">Boxes per Layer: <span id="cpbOutLayerBoxes">0</span></div>
                <div class="cpb-stat-row">Total Boxes Stacked: <span id="cpbOutTotalBoxes">0</span></div>
                <div class="cpb-stat-row">Total Height: <span id="cpbOutHeight">0</span> mm</div>
                <div class="cpb-stat-row">Total Cargo Weight: <span id="cpbOutWeight">0</span> kg</div>
                <div class="cpb-stat-row">Pallet Surface Efficiency: <span id="cpbOutEfficiency">0</span>%</div>
            </div>
        </div>

        <div class="cpb-visualizer">
            <div class="cpb-view-box">
                <h4>2D Floor Plan (Top View)</h4>
                <canvas id="cpbCanvas2D" width="400" height="320"></canvas>
            </div>
            <div class="cpb-view-box">
                <h4>3D Stacking View (Isometric)</h4>
                <canvas id="cpbCanvas3D" width="400" height="320"></canvas>
            </div>
        </div>
    </div>

    <script>
        function runCeramicPalletBuilder() {
            // 1. Get Values
            const pL = parseFloat(document.getElementById('cpbPalletLen').value) || 0;
            const pW = parseFloat(document.getElementById('cpbPalletWid').value) || 0;
            const bL = parseFloat(document.getElementById('cpbBoxLen').value) || 0;
            const bW = parseFloat(document.getElementById('cpbBoxWid').value) || 0;
            const bH = parseFloat(document.getElementById('cpbBoxHei').value) || 0;
            const bWt = parseFloat(document.getElementById('cpbBoxWeight').value) || 0;
            const layers = parseInt(document.getElementById('cpbLayers').value) || 0;

            // 2. Grid Arrangement Logic
            const cols = Math.floor(pL / bL);
            const rows = Math.floor(pW / bW);
            const boxesPerLayer = cols * rows;
            const totalBoxes = boxesPerLayer * layers;
            const totalWeight = totalBoxes * bWt;
            const heightTotal = layers * bH;
            const efficiency = pL * pW > 0 ? (((boxesPerLayer * bL * bW) / (pL * pW)) * 100).toFixed(1) : 0;

            // 3. Update Text Values
            document.getElementById('cpbOutLayerBoxes').innerText = boxesPerLayer;
            document.getElementById('cpbOutTotalBoxes').innerText = totalBoxes;
            document.getElementById('cpbOutHeight').innerText = heightTotal;
            document.getElementById('cpbOutWeight').innerText = totalWeight.toLocaleString();
            document.getElementById('cpbOutEfficiency').innerText = efficiency;

            // 4. Render 2D Canvas
            const c2d = document.getElementById('cpbCanvas2D');
            const ctx2d = c2d.getContext('2d');
            ctx2d.clearRect(0, 0, c2d.width, c2d.height);

            if(pL > 0 && pW > 0) {
                const scale2d = Math.min((c2d.width - 30) / pL, (c2d.height - 30) / pW);
                const oX2d = (c2d.width - (pL * scale2d)) / 2;
                const oY2d = (c2d.height - (pW * scale2d)) / 2;

                // Draw Wood Pallet Base
                ctx2d.fillStyle = '#d7ccc8';
                ctx2d.fillRect(oX2d, oY2d, pL * scale2d, pW * scale2d);
                ctx2d.strokeStyle = '#8d6e63';
                ctx2d.lineWidth = 2;
                ctx2d.strokeRect(oX2d, oY2d, pL * scale2d, pW * scale2d);

                // Draw Box Grid Layout
                ctx2d.fillStyle = '#cfd8dc';
                ctx2d.strokeStyle = '#455a64';
                ctx2d.lineWidth = 1;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        let bx = oX2d + (c * bL * scale2d);
                        let by = oY2d + (r * bW * scale2d);
                        ctx2d.fillRect(bx, by, bL * scale2d, bW * scale2d);
                        ctx2d.strokeRect(bx, by, bL * scale2d, bW * scale2d);
                    }
                }
            }

            // 5. Render 3D Isometric View
            const c3d = document.getElementById('cpbCanvas3D');
            const ctx3d = c3d.getContext('2d');
            ctx3d.clearRect(0, 0, c3d.width, c3d.height);

            if(pL > 0 && pW > 0 && boxesPerLayer > 0) {
                const scale3d = Math.min(c3d.width / (pL + pW), c3d.height / (pW + (layers * bH * 1.3))) * 0.72;
                
                function project(x, y, z) {
                    return {
                        x: c3d.width / 2 + (x - y) * Math.cos(Math.PI / 6) * scale3d,
                        y: c3d.height * 0.75 + (x + y) * Math.sin(Math.PI / 6) * scale3d - (z * scale3d)
                    };
                }

                // Pallet Base 3D
                ctx3d.fillStyle = '#8d6e63';
                ctx3d.beginPath();
                let pt0 = project(0, 0, 0); let pt1 = project(pL, 0, 0);
                let pt2 = project(pL, pW, 0); let pt3 = project(0, pW, 0);
                ctx3d.moveTo(pt0.x, pt0.y); ctx3d.lineTo(pt1.x, pt1.y); ctx3d.lineTo(pt2.x, pt2.y); ctx3d.lineTo(pt3.x, pt3.y);
                ctx3d.closePath(); ctx3d.fill();
                ctx3d.strokeStyle = '#5d4037'; ctx3d.stroke();

                // Stacking Boxes (Bottom Layer to Top Layer)
                ctx3d.strokeStyle = '#37474f';
                ctx3d.lineWidth = 1;
                for (let h = 0; h < layers; h++) {
                    for (let r = rows - 1; r >= 0; r--) {
                        for (let c = 0; c < cols; c++) {
                            let x = c * bL; let y = r * bW; let z = h * bH;

                            let pA = project(x, y, z + bH); let pB = project(x + bL, y, z + bH);
                            let pC = project(x + bL, y + bW, z + bH); let pD = project(x, y + bW, z + bH);
                            let pA_bot = project(x, y, z); let pB_bot = project(x + bL, y, z);
                            let pC_bot = project(x + bL, y + bW, z); let pD_bot = project(x, y + bW, z);

                            // Top Face
                            ctx3d.fillStyle = '#ffe082'; ctx3d.beginPath();
                            ctx3d.moveTo(pA.x, pA.y); ctx3d.lineTo(pB.x, pB.y); ctx3d.lineTo(pC.x, pC.y); ctx3d.lineTo(pD.x, pD.y);
                            ctx3d.closePath(); ctx3d.fill(); ctx3d.stroke();

                            // Right Face Shadow
                            ctx3d.fillStyle = '#ffca28'; ctx3d.beginPath();
                            ctx3d.moveTo(pB.x, pB.y); ctx3d.lineTo(pC.x, pC.y); ctx3d.lineTo(pC_bot.x, pC_bot.y); ctx3d.lineTo(pB_bot.x, pB_bot.y);
                            ctx3d.closePath(); ctx3d.fill(); ctx3d.stroke();

                            // Left Face Shadow
                            ctx3d.fillStyle = '#ffb300'; ctx3d.beginPath();
                            ctx3d.moveTo(pA.x, pA.y); ctx3d.lineTo(pD.x, pD.y); ctx3d.lineTo(pD_bot.x, pD_bot.y); ctx3d.lineTo(pA_bot.x, pA_bot.y);
                            ctx3d.closePath(); ctx3d.fill(); ctx3d.stroke();
                        }
                    }
                }
            }
        }

        // Initialize App on Load
        document.addEventListener("DOMContentLoaded", function() {
            runCeramicPalletBuilder();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceramic Pallet Builder | Shakthi Chathuranga</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: linear-gradient(135deg, #1e293b, #0f172a);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; padding-bottom: 60px; }
        
        nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0 50px; display: flex; justify-content: space-between; align-items: center; height: 80px;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo {
            font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
            background: linear-gradient(to right, #38bdf8, #0ea5e9);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none;
        }
        .nav-tabs { display: flex; list-style: none; height: 100%; gap: 10px; }
        .nav-tabs a {
            display: flex; align-items: center; padding: 0 20px; text-decoration: none;
            color: var(--text-muted); font-weight: 500; height: 100%; transition: all 0.3s ease;
            border-bottom: 3px solid transparent; white-space: nowrap;
        }
        .nav-tabs a:hover, .nav-tabs a.active { color: var(--accent-blue); border-bottom: 3px solid var(--accent-blue); }

        .page-container { max-width: 1300px; margin: 0 auto; padding: 40px 20px; }
        .tool-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .tool-header h1 { font-size: 28px; font-weight: 700; color: #ffffff; }
        .back-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); color: var(--text-main);
            text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-blue); }

        .pb-main-container { display: flex; gap: 25px; background: var(--card-bg); border: 1px solid var(--border-color); padding: 30px; border-radius: 20px; }
        .pb-controls { flex: 1; display: flex; flex-direction: column; gap: 18px; min-width: 340px; }
        .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.75px; color: var(--accent-blue); border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 6px; }
        .pb-input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .pb-input-group { display: flex; flex-direction: column; gap: 6px; }
        .pb-input-group label { font-weight: 500; color: var(--text-muted); font-size: 13px; }
        .pb-input-group input, .pb-input-group select {
            padding: 11px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; font-size: 14px; background: rgba(15, 23, 42, 0.6); color: #ffffff;
        }
        .pb-input-group select option { background: #1e293b; color: #fff; }
        
        .cta-btn {
            display: inline-flex; justify-content: center; align-items: center; gap: 8px; background: linear-gradient(to right, #0ea5e9, #2563eb);
            color: #ffffff; border: none; padding: 14px; font-size: 15px; font-weight: 600; border-radius: 10px; cursor: pointer; transition: all 0.3s ease; margin-top: 10px;
        }
        .cta-btn:hover { transform: translateY(-2px); background: linear-gradient(to right, #38bdf8, #2563eb); }

        .pb-stats { background: rgba(15, 23, 42, 0.8); border: 1px solid var(--border-color); padding: 18px; border-radius: 12px; }
        .pb-stat-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 14px; color: var(--text-muted); }
        .pb-stats span { font-weight: 600; color: #4ade80; }
        .pb-stats span.highlight { color: var(--accent-blue); }

        .pb-visualizer { flex: 2; display: flex; flex-direction: column; gap: 20px; }
        .pb-view-box { background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; }
        .pb-view-box h4 { margin-bottom: 12px; color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .pb-view-box canvas { background: #0f172a; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px; width: 100%; height: auto; }

        @media (max-width: 1024px) {
            .pb-main-container { flex-direction: column; }
            .tool-header { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">SC. <span>Portal</span></a>
        <ul class="nav-tabs">
            <li><a href="index.html">Home</a></li>
            <li><a href="tools.html" class="active">Production Tools</a></li>
        </ul>
    </nav>

    <div class="page-container">
        <div class="tool-header">
            <h1>🧱 Ceramic Pallet Builder</h1>
            <a href="tools.html" class="back-btn">← Back to Tools</a>
        </div>

        <div class="pb-main-container">
            <div class="pb-controls">
                <div class="section-title">Pallet Base Specifications</div>
                <div class="pb-input-group">
                    <label>Select Pallet Standard Type</label>
                    <select id="pbPreset" onchange="applyPalletPreset()">
                        <option value="industrial" selected>Standard Industrial Pallet (1200x1000)</option>
                        <option value="euro">Euro Pallet Standard (1200x800)</option>
                        <option value="custom">Custom Dimension setup</option>
                    </select>
                </div>

                <div class="pb-input-grid">
                    <div class="pb-input-group">
                        <label>Length (mm)</label>
                        <input type="number" id="pbPalletLen" value="1200" oninput="setCustomPreset()">

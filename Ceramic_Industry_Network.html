<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceramic Industry Network | Shakthi Chathuranga</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* 🌐 Premium Navigation Bar */
        nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #38bdf8, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tabs {
            display: flex;
            list-style: none;
            height: 100%;
            gap: 10px;
        }

        .nav-tabs a {
            display: flex;
            align-items: center;
            padding: 0 20px;
            text-decoration: none;
            color: #94a3b8;
            font-weight: 500;
            height: 100%;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .nav-tabs a:hover, .nav-tabs a.active {
            color: #38bdf8;
            border-bottom: 3px solid #38bdf8;
        }

        /* 📁 Directory Wrapper */
        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
            min-height: 85vh;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-section h1 {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .header-section h1 span {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-section p {
            color: #94a3b8;
            font-size: 16px;
        }

        /* 🔍 Google CSE Embed Container Panel */
        .search-engine-box {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-top: 20px;
        }

        /* 🎨 Custom Styling overrides to blend Google CSE with your Dark Theme */
        .gsc-control-cse {
            background-color: transparent !important;
            border: none !important;
            padding: 0 !important;
        }

        .gsc-search-box-tools .gsc-search-box .gsc-input {
            background: #0f172a !important;
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 8px !important;
            padding: 10px !important;
        }

        .gsc-search-button-v2 {
            background-color: #0ea5e9 !important;
            border-color: #0ea5e9 !important;
            border-radius: 8px !important;
            padding: 12px 24px !important;
        }

        .gsc-search-button-v2:hover {
            background-color: #38bdf8 !important;
        }

        .gsc-results-wrapper-overlay, .gsc-results-wrapper-visible {
            color: #f8fafc !important;
        }

        .gs-title, .gs-title *, .gsc-thumbnail-inside a {
            color: #38bdf8 !important;
            text-decoration: none !important;
        }

        .gs-snippet {
            color: #94a3b8 !important;
        }

        .gsc-url-top, .gsc-url-bottom {
            color: #64748b !important;
        }

        .gsc-webResult.gsc-result {
            background: rgba(15, 23, 42, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            padding: 15px !important;
            border-radius: 12px !important;
            margin-bottom: 15px !important;
        }

        .gsc-webResult.gsc-result:hover {
            border-color: rgba(56, 189, 248, 0.2) !important;
            background: rgba(30, 41, 59, 0.6) !important;
        }

        footer {
            padding: 40px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            font-size: 14px;
            text-align: center;
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .nav-tabs { display: none; }
        }
    </style>
    <!-- 🚀 Google Programmable Search Engine Script Elements -->
    <script async src="https://cse.google.com/cse.js?cx=a01c46b090e3a47e6"></script>
</head>
<body>

    <!-- 🌐 Premium Navigation Bar -->
    <nav>
        <div class="logo">SC. <span>Portal</span></div>
        <ul class="nav-tabs">
            <li><a href="index.html">Home</a></li>
            <li><a href="tools.html">Tools</a></li>
            <li><a href="ceramic_news.html">Ceramic News</a></li>
            <li><a href="#" class="active">Industry Network</a></li>
        </ul>
    </nav>

    <!-- 📁 Main Content Wrapper -->
    <div class="main-container">
        
        <div class="header-section">
            <h1>Ceramic <span>Industry Network</span></h1>
            <p>Search and locate manufacturing plants, suppliers, and global operators live inside the portal.</p>
        </div>

        <!-- 🔍 Embedded Live Search Engine Interface Panel -->
        <div class="search-engine-box">
            <div class="gcse-search"></div>
        </div>

    </div>

    <!-- 👣 Footer -->
    <footer>
        &copy; 2026 Developed by Shakthi Chathuranga &middot; All Rights Reserved.
    </footer>

</body>
</html>
